# Example configuration: 3-drone Kuramoto synchronisation
num_drones: 3
duration: 120.0
dt: 0.01
seed: 42

environment:
  dimensions: 2
  decay_function: exponential
  decay_length_scale: 5.0
  max_detection_range: 50.0
  detection_probability: 1.0

# Each oscillator can have different parameters
oscillators:
  - model: kuramoto
    natural_frequency: 1.0
    initial_phase_min: 0.0
    initial_phase_max: 6.283185
    coupling_strength: 1.2

  - model: kuramoto
    natural_frequency: 1.05
    initial_phase_min: 0.0
    initial_phase_max: 6.283185
    coupling_strength: 1.2

  - model: kuramoto
    natural_frequency: 1.10
    initial_phase_min: 0.0
    initial_phase_max: 6.283185
    coupling_strength: 1.2

# Fixed drone positions (x, y) in metres
drone_positions:
  - [0.0, 0.0]
  - [3.0, 4.0]
  - [6.0, 0.0]

log_enabled: true
log_format: csv
log_dir: experiments/logs
