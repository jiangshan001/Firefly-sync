# Model 2 — PCO-I&F Baseline Configuration (DRAFT)
# Parameter ranges are candidates pending mock batch tuning.
# See: docs/synchronisation_models/model_2_pco_integrate_fire.md

model: pulse_coupled_integrate_fire
model_name_display: "PCO-I&F"

# --- Oscillator parameters ---
oscillator:
  natural_frequency_hz: 1.5        # free-running follower frequency
  epsilon: 0.15                    # phase advance per leader pulse [0.05, 0.40]
  fire_threshold: 1.0              # phase value triggering flash
  refractory_period_s: 0.06        # post-fire refractory window

# --- Tuning sweep candidates ---
tuning_sweep:
  epsilon_values: [0.05, 0.10, 0.15, 0.20, 0.30, 0.40]
  refractory_values: [0.04, 0.06, 0.08]

# --- Detection ---
detection:
  min_leader_flash_interval_s: 0.20
  detection_mode: local_contrast

# --- Trial ---
trial:
  duration_s: 30
  repeats_per_condition: 5
  sync_threshold_s: 0.10
  sync_cycles: 5
  flash_on_time_s: 0.06
